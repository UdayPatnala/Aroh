<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Circular background - cream/off-white matching AROH theme -->
  <circle cx="50" cy="50" r="50" fill="#f5f4f0"/>
  <!-- Square frame (AROH logo geometric lines) -->
  <rect x="22" y="18" width="56" height="56" fill="none" stroke="#0f172a" stroke-width="3.5" stroke-linejoin="round"/>
  <!-- Diagonal line through square -->
  <line x1="22" y1="18" x2="78" y2="74" stroke="#0f172a" stroke-width="3.5" stroke-linecap="round"/>
  <!-- AROH text -->
  <text x="50" y="92" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="800" fill="#0f172a" text-anchor="middle" letter-spacing="4">AROH</text>
</svg>
